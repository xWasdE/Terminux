<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Terminux | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; }
        .box { max-width: 900px; margin: 0 auto; border: 1px solid #111; background: #050505; padding: 40px; border-radius: 8px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .upload-section { border: 1px solid #222; padding: 25px; background: #0a0a0a; border-radius: 4px; }
        input { background: #000; border: 1px solid #222; color: #fff; padding: 15px; width: 100%; box-sizing: border-box; }
        label { font-size: 11px; color: #666; text-transform: uppercase; display: block; margin-bottom: 12px; letter-spacing: 1px; font-weight: bold; }
        button { background: #fff; color: #000; border: none; padding: 15px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 15px; }
        button:hover { opacity: 0.8; }
        .btn-ana { background: #00ff00; color: #000; }
        .btn-am { background: #00ccff; color: #000; }
        .btn-update { background: #ffbc00; color: #000; }
        .log { margin-top: 30px; font-family: monospace; font-size: 12px; color: #555; border-top: 1px solid #111; padding-top: 20px; height: 250px; overflow-y: auto; }
        h1 { margin-bottom: 40px; font-size: 24px; letter-spacing: -1px; }
        .sep { height: 1px; background: #111; margin: 40px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>TERMINUX ADMIN</h1>
        
        <label>MANUEL KAYIT VE STOK GÜNCELLEME</label>
        <div class="row">
            <input type="text" id="m-kod" placeholder="Ürün Kodu">
            <input type="text" id="m-ad" placeholder="Ürün Adı">
        </div>
        <div class="row">
            <input type="number" id="m-ana" placeholder="Ana Depo Stok Miktarı">
            <input type="number" id="m-am" placeholder="Ameliyathane Stok Miktarı">
        </div>
        <button id="btn-m">VERİTABANINA YAZ / GÜNCELLE</button>

        <div class="sep"></div>

        <label>1. AŞAMA: ANA LİSTE YÜKLEME (SADECE YENİ ÜRÜNLER VE STOKLAR)</label>
        <div class="row">
            <div class="upload-section">
                <label style="color: #00ff00;">ANA DEPO LİSTESİ</label>
                <input type="file" id="f-ana" accept=".xlsx">
                <button id="btn-ana" class="btn-ana">ANA DEPO YÜKLE</button>
            </div>
            
            <div class="upload-section">
                <label style="color: #00ccff;">AMELİYATHANE LİSTESİ</label>
                <input type="file" id="f-am" accept=".xlsx">
                <button id="btn-am" class="btn-am">AMELİYATHANE YÜKLE</button>
            </div>
        </div>

        <div class="sep"></div>

        <label>2. AŞAMA: EK VERİ GÜNCELLEME (REUSE, DUMMY, ALT GRUP, STOK ADRESİ)</label>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Bu alan mevcut ürünlerin üzerindeki ekstra verileri günceller. Aynı ürün koduna sahip olmaları gerekir.</p>
        <div class="row">
            <div class="upload-section">
                <label style="color: #ffbc00;">ANA DEPO EK VERİ</label>
                <input type="file" id="f-ana-ext" accept=".xlsx">
                <button id="btn-ana-ext" class="btn-update">ANA DEPO GÜNCELLE</button>
            </div>
            
            <div class="upload-section">
                <label style="color: #ffbc00;">AMELİYATHANE EK VERİ</label>
                <input type="file" id="f-am-ext" accept=".xlsx">
                <button id="btn-am-ext" class="btn-update">AMELİYATHANE GÜNCELLE</button>
            </div>
        </div>

        <div id="log" class="log">Sistem komut bekliyor...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX-X3ri95oQtO53tgEyAwqHuu1mmYKONM",
            authDomain: "terminux-wms.firebaseapp.com",
            projectId: "terminux-wms",
            storageBucket: "terminux-wms.firebasestorage.app",
            messagingSenderId: "427323493367",
            appId: "1:427323493367:web:8c0f7bdd21fe5b83c3bcf2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const logger = (m) => {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        document.getElementById('btn-m').addEventListener('click', async () => {
            const id = document.getElementById('m-kod').value.trim();
            const ad = document.getElementById('m-ad').value.trim();
            if(!id) return;
            
            const anaVal = document.getElementById('m-ana').value;
            const amVal = document.getElementById('m-am').value;
            
            if(anaVal !== "") {
                await setDoc(doc(db, "ana_depo", id), { urunKodu: id, urunAdi: ad, miktar: parseInt(anaVal) }, { merge: true });
                logger("Ana Depo kaydı eklendi: " + id);
            }
            if(amVal !== "") {
                await setDoc(doc(db, "ameliyathane", id), { urunKodu: id, urunAdi: ad, miktar: parseInt(amVal) }, { merge: true });
                logger("Ameliyathane kaydı eklendi: " + id);
            }
            
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(el => el.value = '');
        });

        async function processPrimaryExcel(inputId, depoType) {
            const file = document.getElementById(inputId).files[0];
            if(!file) return logger("Lütfen Excel dosyası seçin.");

            const collectionName = depoType === "ANA" ? "ana_depo" : "ameliyathane";
            const reader = new FileReader();

            reader.onload = async (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                logger(`(${depoType} - BİRİNCİL) ${rows.length} satır işleniyor...`);

                let addCount = 0, skipCount = 0;
                
                for (let r of rows) {
                    const id = r["Ürün Kodu"] ? r["Ürün Kodu"].toString().trim() : null;
                    if(!id) continue;

                    const snap = await getDoc(doc(db, collectionName, id));
                    if (snap.exists()) { skipCount++; continue; }

                    let urunAdiStr = r["Ürün Adı"] || "";
                    let refNoStr = (r["Ref No"] || r["REF"] || "").toString().trim();

                    if (!refNoStr && urunAdiStr.includes(",")) {
                        const parts = urunAdiStr.split(",");
                        refNoStr = parts[parts.length - 1].trim();
                        urunAdiStr = parts.slice(0, -1).join(",").trim();
                    }
                    if(!refNoStr) refNoStr = "BULUNAMADI";

                    let barkodVal = r["Barkod"] ? r["Barkod"].toString().trim() : "";
                    let minAlertVal = parseInt(r["MİN(Kritik)"]) || parseInt(r["Min(Kritik)"]) || parseInt(r["Min (Kritik)"]) || parseInt(r["Min"]) || 0;

                    const data = {
                        urunKodu: id,
                        barkod: barkodVal,
                        urunAdi: urunAdiStr,
                        refNo: refNoStr,
                        surecTipi: r["Süreç Tipi"] || "",
                        miatTarihi: r["Miat Tarihi"] || "",
                        minAlert: minAlertVal,
                        max: parseInt(r["Max"]) || parseInt(r["Maks"]) || 0,
                        miktar: parseInt(r["Miktar"]) || 0
                    };

                    await setDoc(doc(db, collectionName, id), data);
                    addCount++;
                }
                
                logger(`(${depoType} - BİRİNCİL) BİTTİ. Yeni: ${addCount} | Atlanan: ${skipCount}`);
                document.getElementById(inputId).value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        async function processExtraDataExcel(inputId, depoType) {
            const file = document.getElementById(inputId).files[0];
            if(!file) return logger("Lütfen Güncelleme Excel dosyası seçin.");

            const collectionName = depoType === "ANA" ? "ana_depo" : "ameliyathane";
            const reader = new FileReader();

            reader.onload = async (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                logger(`(${depoType} - GÜNCELLEME) ${rows.length} satır kontrol ediliyor...`);

                let updateCount = 0;
                
                for (let r of rows) {
                    const id = r["Ürün Kodu"] ? r["Ürün Kodu"].toString().trim() : null;
                    if(!id) continue;

                    // KESİN DUMMY MANTIĞI: Sadece "EVET" veya "DUMMY" yazıyorsa DUMMY olur.
                    let rawDummy = (r["Dummy"] || r["DUMMY"] || "").toString().trim().toUpperCase();
                    let isDummy = (rawDummy === "EVET" || rawDummy === "DUMMY") ? "DUMMY" : "DUMMY DEĞİL";

                    // KESİN REUSE MANTIĞI: Sadece "REUSE" yazıyorsa REUSE olur. (SIFIR veya boşsa REUSE DEĞİL)
                    let rawReuse = (r["Reuse"] || r["REUSE"] || r["Reuse/Sıfır"] || "").toString().trim().toUpperCase();
                    let isReuse = (rawReuse === "REUSE") ? "REUSE" : "REUSE DEĞİL";

                    const extraData = {
                        altGrup: (r["Alt Grup"] || r["ALT GRUP"] || "").toString().trim(),
                        stokAdresi: (r["Stok Adresi"] || r["STOK ADRESİ"] || r["Adres"] || "").toString().trim(),
                        dummy: isDummy,
                        reuse: isReuse
                    };

                    await setDoc(doc(db, collectionName, id), extraData, { merge: true });
                    updateCount++;
                }
                
                logger(`(${depoType} - GÜNCELLEME) BİTTİ. Güncellenen Kayıt: ${updateCount}`);
                document.getElementById(inputId).value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        document.getElementById('btn-ana').addEventListener('click', () => processPrimaryExcel('f-ana', 'ANA'));
        document.getElementById('btn-am').addEventListener('click', () => processPrimaryExcel('f-am', 'AMELİYATHANE'));
        
        document.getElementById('btn-ana-ext').addEventListener('click', () => processExtraDataExcel('f-ana-ext', 'ANA'));
        document.getElementById('btn-am-ext').addEventListener('click', () => processExtraDataExcel('f-am-ext', 'AMELİYATHANE'));
    </script>
</body>
</html>
